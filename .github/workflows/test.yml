name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Only one run per branch — newer pushes cancel older runs.
concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: lint + build + playwright
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Cache the Playwright browser binary so we don't re-download Chromium
      # (~150 MB) on every run. Key on the resolved @playwright/test version
      # so a runtime upgrade busts the cache automatically.
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps (cache hit path)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Lint
        run: npm run lint

      # The webServer config in playwright.config.ts boots `firebase
      # emulators:start --only hosting`, which serves dist/. So the dist
      # tree must exist before tests run.
      - name: Build
        run: npm run build

      - name: Run Playwright tests
        run: npm test
        env:
          CI: "true"

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
