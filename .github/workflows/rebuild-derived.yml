name: rebuild-derived
on:
  schedule:
    # Sunday 23:00 UTC = Monday 02:00 Europe/Sofia. After most weekend ingest
    # work is settled. Weekly recompute of loyalty / similarity / cohesion.
    - cron: "0 23 * * 0"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: rebuild-derived
  cancel-in-progress: false

jobs:
  rebuild:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GCS_BUCKET: gs://data-electionsbg-com
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Authenticate to GCS
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCS_SERVICE_ACCOUNT_JSON }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Rebuild derived metrics
        run: npm run derived:rebuild -- --upload

      - name: Commit derived outputs
        run: |
          git config user.name  "derived-bot"
          git config user.email "derived-bot@users.noreply.github.com"
          git add data/parliament/votes/derived
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "derived: weekly rebuild $(date -u +%Y-%m-%d)"
            git pull --rebase origin main
            git push
          fi
